<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相册</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #eee; font-family: -apple-system, sans-serif; }
  h1 { text-align: center; padding: 30px 0 10px; font-size: 24px; }
  .filters { text-align: center; margin-bottom: 24px; }
  .filters button {
    background: #222; color: #aaa; border: 1px solid #333;
    padding: 6px 18px; margin: 4px; border-radius: 20px; cursor: pointer; font-size: 14px;
  }
  .filters button.active { background: #fff; color: #000; border-color: #fff; }
  .gallery { position: relative; }
  .gallery .item { break-inside: avoid; margin-bottom: 16px; border-radius: 10px; overflow: hidden; }
  .gallery img { width: 100%; display: block; cursor: pointer; transition: transform 0.2s; }
  .gallery img:hover { transform: scale(1.02); }
  .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; justify-content: center; align-items: center; }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 90%; max-height: 90%; border-radius: 8px; }
  .info { text-align: center; padding: 10px; color: #888; }
</style>
<script src="https://cdn.jsdelivr.net/npm/masonry-layout@4.2.2/dist/masonry.pkgd.min.js"></script>
</head>
<body>
<h1>📷 相册</h1>

<div class="filters" id="filters">
  <button class="active" data-year="all">全部</button>
</div>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightbox-img" src="">
</div>

<script>
let allPhotos = {};
let masonry;

fetch('photos.json')
  .then(r => r.json())
  .then(data => {
    allPhotos = data;
    buildFilters();
    render(Object.keys(data));
  });

function buildFilters() {
  const years = new Set();
  Object.values(allPhotos).forEach(p => years.add(p.year));
  const container = document.getElementById('filters');
  [...years].sort().forEach(y => {
    const btn = document.createElement('button');
    btn.textContent = y;
    btn.dataset.year = y;
    btn.onclick = () => {
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(y === 'all' ? Object.keys(allPhotos) : Object.keys(allPhotos).filter(k => allPhotos[k].year === y));
    };
    container.appendChild(btn);
  });
}

function render(keys) {
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';
  keys.forEach(k => {
    const p = allPhotos[k];
    const div = document.createElement('div');
    div.className = 'item';
    const img = document.createElement('img');
    img.src = p.thumbnail || p.url;
    img.alt = p.filename;
    img.loading = 'lazy';
    img.onclick = () => {
      document.getElementById('lightbox-img').src = p.url;
      document.getElementById('lightbox').classList.add('show');
    };
    div.appendChild(img);
    gallery.appendChild(div);
  });
  if (masonry) masonry.destroy();
  masonry = new Masonry(gallery, { itemSelector: '.item', columnWidth: '.item', percentPosition: true, gutter: 16 });
}
</script>
</body>
</html>
