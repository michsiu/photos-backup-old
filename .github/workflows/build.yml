# 工作流名称：Build Gallery
name: Build Gallery

# 触发条件配置
on:
  # 允许通过 GitHub 网页或 API 手动触发此工作流
  workflow_dispatch:

  # 定时触发：使用 cron 表达式，每 5 分钟运行一次
  schedule:
    - cron: '*/5 * * * *'   # 分 时 日 月 周，*/5 表示每 5 分钟

# 并发控制：防止多个实例同时运行
concurrency:
  group: gallery-process          # 并发组名，相同组内只允许一个运行
  cancel-in-progress: true       # 当新任务触发时，取消正在进行的旧任务

# 定义要执行的任务（一个工作流可以包含多个 jobs，这里只有一个）
jobs:
  build:                         # 任务 ID
    # 条件判断：只有触发者不是 github-actions[bot] 时才运行，避免机器人自身循环触发
    if: github.actor != 'github-actions[bot]'

    # 运行环境：最新版 Ubuntu
    runs-on: ubuntu-latest

    # 赋予此任务的权限：允许对仓库内容进行写操作（用于 git push）
    permissions:
      contents: write

    # 任务执行的步骤列表
    steps:
      # 步骤1：检出代码仓库
      - name: 检出代码
        uses: actions/checkout@v4      # 使用官方的 checkout action，版本 v4
        with:
          fetch-depth: 0               # 拉取所有历史记录（默认深度为1，设为0表示完整克隆）

      # 步骤2：安装依赖软件
      - name: 安装依赖
        run: |                         # run 后跟多行命令（使用管道符 |）
          sudo apt-get update          # 更新软件包列表
          sudo apt-get install -y imagemagick unzip uuid-runtime
          # imagemagick：图片处理（生成缩略图）
          # unzip：解压 ZIP 文件
          # uuid-runtime：提供 uuidgen 命令，生成唯一标识符

      # 步骤3：创建所需目录
      - name: 创建目录
        run: |
          mkdir -p incoming   # 存放上传的 ZIP 或临时图片
          mkdir -p photos     # 归档后的原始照片（按年份分类）
          mkdir -p thumbs     # 缩略图，与 photos 目录结构对应
          mkdir -p page       # 用于存放生成的页面文件（静态 HTML 等）

      # =========================================
      # 步骤4：解压 ZIP 文件，提取图片
      # =========================================
      - name: 解压 ZIP 文件
        run: |
          # 开启 nullglob 选项：若没有匹配的文件，通配符展开为空数组，而不是保留原字符串
          shopt -s nullglob

          # 使用 mapfile 将 find 命令的输出存入数组 zipfiles
          mapfile -t zipfiles < <(
            find incoming -type f -iname "*.zip"   # 在 incoming 目录下查找所有 .zip 文件（不区分大小写）
          )

          # 遍历每一个 ZIP 文件
          for zipfile in "${zipfiles[@]}"; do
            [ -f "$zipfile" ] || continue          # 如果不是普通文件则跳过（安全检查）

            echo "解压 ZIP: $zipfile"

            # 创建临时目录用于解压
            extract_dir=$(mktemp -d)

            # 解压 ZIP 到临时目录，-q 静默模式，-o 覆盖已存在文件
            unzip -oq "$zipfile" -d "$extract_dir"

            # 找到临时目录中的所有文件（非目录）
            mapfile -t extracted_files < <(
              find "$extract_dir" -type f
            )

            # 遍历解压出的每个文件
            for extracted in "${extracted_files[@]}"; do
              # 提取文件扩展名（后缀）
              ext="${extracted##*.}"               # ## 表示贪婪删除最长前缀，保留后缀


                # 将扩展名转为小写
                ext=$(echo "$ext" | tr '[:upper:]' '[:lower:]')


                # 移动文件到 incoming 目录
                mv "$extracted" "incoming/"
                echo "提取文件: $(basename "$extracted")"

            done

            # 删除临时目录及其内容
            rm -rf "$extract_dir"
            # 删除原 ZIP 文件（已经处理完毕）
            rm -f "$zipfile"
            echo "删除 ZIP: $zipfile"
          done

      # =========================================
      # 步骤5：归档照片（去重、按年份分类、生成元数据）
      # =========================================
      - name: 归档照片并更新 JSON
        run: |
          shopt -s nullglob

          # 查找 incoming 目录下所有图片文件（jpg/jpeg/png/webp，不区分大小写）
          mapfile -t images < <(
            find incoming -type f \( \
              -iname "*.jpg" -o \
              -iname "*.jpeg" -o \
              -iname "*.png" -o \
              -iname "*.webp" \
            \)
          )

          # 遍历每个图片文件
          for img in "${images[@]}"; do
            [ -f "$img" ] || continue

            # 计算文件的 SHA256 哈希值，用于去重和唯一命名
            sha256=$(sha256sum "$img" | cut -d' ' -f1)   # cut 取第一列（哈希值）

            # 提取原扩展名并转为小写
            ext="${img##*.}"
            ext=$(echo "$ext" | tr '[:upper:]' '[:lower:]')

            # ---------- 重复图片检测 ----------
            # 在 photos 目录下查找是否存在以该哈希值开头的文件（格式：{sha256}.任意扩展名）
            if find photos -type f | grep -q "/$sha256\."; then
              echo "重复图片，删除: $img"
              rm -f "$img"
              continue
            fi

            # 新图片的哈希命名
            hashname="$sha256.$ext"

            # ---------- 提取或推断拍摄日期 ----------
            # 优先从 EXIF 中读取 DateTimeOriginal 标签
            exif_date=$(identify -format '%[EXIF:DateTimeOriginal]' "$img" 2>/dev/null)
            original_name=$(basename "$img")   # 当前临时文件名（可能是 uuid）

            if [ -n "$exif_date" ]; then
              # 有 EXIF 日期：格式为 "YYYY:MM:DD HH:MM:SS"，取年份和完整日期
              year=$(echo "$exif_date" | cut -d: -f1)
              full_date=$(echo "$exif_date" | cut -d' ' -f1 | tr ':' '-')   # 转为 YYYY-MM-DD
            else
              # 无 EXIF，检查文件名是否包含分隔符 "==boundary=="
              if echo "$original_name" | grep -q '==boundary=='; then
                # 分隔符前是日期部分，后是原始文件名（暂未使用）
                date_part=$(echo "$original_name" | sed 's/==boundary==.*//')
                original_name=$(echo "$original_name" | sed 's/.*==boundary==//')

                # 尝试解析日期格式 "YYYY-MM-DD HH:MM" 或 "YYYY/MM/DD HH:MM"
                if echo "$date_part" | grep -qE '^[0-9]{4}[-/][0-9]{2}[-/][0-9]{2} [0-9]{2}:[0-9]{2}$'; then
                  full_date=$(echo "$date_part" | cut -d' ' -f1 | sed 's/\//-/g')   # 统一为 -
                  year=$(echo "$full_date" | cut -d- -f1)
                # 尝试解析日期格式 "YYYYMMDD"
                elif echo "$date_part" | grep -qE '^[0-9]{8}$'; then
                  year=$(echo "$date_part" | cut -c1-4)
                  full_date=$(echo "$date_part" | sed 's/\(....\)\(..\)\(..\)/\1-\2-\3/')
                else
                  # 无法解析，使用文件修改时间
                  year=$(date -r "$img" +%Y)
                  full_date=$(date -r "$img" +%Y-%m-%d)
                fi
              else
                # 无 EXIF 且无边界符，直接使用文件修改时间
                year=$(date -r "$img" +%Y)
                full_date=$(date -r "$img" +%Y-%m-%d)
              fi
            fi

            # 按年份创建子目录（如 photos/2025/）
            target_dir="photos/$year"
            mkdir -p "$target_dir"

            # 移动图片到目标目录，并重命名为哈希名
            mv "$img" "$target_dir/$hashname"

            # 将元数据通过环境变量传递给 Python 脚本，用于生成 JSON 索引
            export ORIGINAL_NAME="$original_name"
            export HASH_NAME="$hashname"
            export YEAR="$year"
            export FULL_DATE="$full_date"
            export SHA256="$sha256"

            # 调用外部 Python 脚本（假设 scripts/build_entry.py 存在）
            python3 scripts/build_entry.py

            echo "归档完成: $original_name → $year/$hashname"
          done

      # =========================================
      # 步骤6：生成缩略图
      # =========================================
      - name: 生成缩略图
        run: |
          # 查找 photos 目录下所有图片文件
          mapfile -t photo_files < <(
            find photos -type f \( \
              -iname "*.jpg" -o \
              -iname "*.jpeg" -o \
              -iname "*.png" -o \
              -iname "*.webp" \
            \)
          )

          for img in "${photo_files[@]}"; do
            # 去掉 "photos/" 前缀，得到相对路径
            relative_path="${img#photos/}"
            # 缩略图保存路径：thumbs/相对路径
            thumb_path="thumbs/$relative_path"
            thumb_dir=$(dirname "$thumb_path")
            mkdir -p "$thumb_dir"       # 创建对应的子目录

            # 如果缩略图不存在则生成
            if [ ! -f "$thumb_path" ]; then
              # ImageMagick convert 命令：缩放至宽度 400 像素，高度自适应，质量 80%
              convert "$img" -resize 400x -quality 80 "$thumb_path"
              echo "生成缩略图: $relative_path"
            fi
          done

      # =========================================
      # 步骤7：清理多余的缩略图（原始图片已删除的）
      # =========================================
      - name: 清理多余缩略图
        run: |
          # 找到所有缩略图文件
          mapfile -t thumbs_files < <(
            find thumbs -type f
          )

          for thumb in "${thumbs_files[@]}"; do
            # 推测原始图片路径：将 thumbs/ 前缀替换为 photos/
            original="photos/${thumb#thumbs/}"
            # 如果原始图片不存在，则删除该缩略图
            [ -f "$original" ] || rm -f "$thumb"
          done

          # 删除所有空目录（忽略错误，如目录非空会失败）
          find thumbs -type d -empty -delete 2>/dev/null || true

      # =========================================
      # 步骤8：提交并推送所有更改到仓库
      # =========================================
      - name: 提交更改
        run: |
          # 配置 Git 用户信息（使用 GitHub Actions 机器人账户）
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 添加所有变更（包括新增、修改、删除的文件）
          git add -A

          # 检查是否有变更需要提交，若无则直接退出
          git diff --cached --quiet && exit 0

          # 提交变更，提交信息中包含 [skip ci] 以避免触发新的 CI 循环
          git commit -m "更新相册 [skip ci]"

          # 拉取远程 main 分支的最新内容，并尝试变基（rebase）
          git fetch origin main
          git rebase origin/main || (
            # 若发生冲突，放弃变基，等待下次定时任务处理
            git rebase --abort
            echo "Rebase 冲突，等待下次定时任务"
            exit 0
          )

          # 推送更改到远程 main 分支
          git push
