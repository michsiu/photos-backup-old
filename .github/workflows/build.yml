name: Build Gallery

on:
  push:
    paths:
      - '*.jpg'
      - '*.jpeg'
      - '*.png'
      - '*.webp'
      - '*.JPG'
      - '*.JPEG'
      - '*.PNG'
      - '*.WEBP'

  workflow_dispatch:

concurrency:
  group: build-gallery
  cancel-in-progress: false

jobs:
  build:
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装图片处理工具
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: 创建必要目录
        run: |
          mkdir -p photos
          mkdir -p thumbs
          mkdir -p page

      - name: 归档照片并更新 JSON
        run: |
          shopt -s nullglob

          for img in *.jpg *.jpeg *.png *.webp *.JPG *.JPEG *.PNG *.WEBP; do

            [ -f "$img" ] || continue

            sha256=$(sha256sum "$img" | cut -d' ' -f1 | head -c 12)

            ext="${img##*.}"

            hashname="$sha256.$ext"

            exif_date=$(identify -format '%[EXIF:DateTimeOriginal]' "$img" 2>/dev/null)

            original_name="$img"

            if [ -n "$exif_date" ]; then

              year=$(echo "$exif_date" | cut -d: -f1)

              full_date=$(echo "$exif_date" | cut -d' ' -f1 | tr ':' '-')

            else

              if echo "$img" | grep -q '==boundary=='; then

                date_part=$(echo "$img" | sed 's/==boundary==.*//')

                original_name=$(echo "$img" | sed 's/.*==boundary==//')

                if echo "$date_part" | grep -qE '^[0-9]{4}[-/][0-9]{2}[-/][0-9]{2}$'; then

                  full_date=$(echo "$date_part" | sed 's/\//-/g')

                  year=$(echo "$full_date" | cut -d- -f1)

                elif echo "$date_part" | grep -qE '^[0-9]{8}$'; then

                  year=$(echo "$date_part" | cut -c1-4)

                  full_date=$(echo "$date_part" | sed 's/\(....\)\(..\)\(..\)/\1-\2-\3/')

                else

                  year=$(date -r "$img" +%Y)

                  full_date=$(date -r "$img" +%Y-%m-%d)

                fi

              else

                year=$(date -r "$img" +%Y)

                full_date=$(date -r "$img" +%Y-%m-%d)

              fi

            fi

            target_dir="photos/$year"

            mkdir -p "$target_dir"

            mv "$img" "$target_dir/$hashname"

            export ORIGINAL_NAME="$original_name"

            export HASH_NAME="$hashname"

            export YEAR="$year"

            export FULL_DATE="$full_date"

            export SHA256="$sha256"

            python3 scripts/build_entry.py

            echo "归档: $img → $year/$hashname"

          done

      - name: 生成缩略图
        run: |
          find photos/ -type f \( \
            -iname "*.jpg" -o \
            -iname "*.jpeg" -o \
            -iname "*.png" -o \
            -iname "*.webp" \
          \) | while read img; do

            relative_path="${img#photos/}"

            thumb_path="thumbs/$relative_path"

            thumb_dir=$(dirname "$thumb_path")

            mkdir -p "$thumb_dir"

            if [ ! -f "$thumb_path" ]; then

              convert "$img" -resize 400x -quality 80 "$thumb_path"

              echo "缩略图: $relative_path"

            fi

          done

      - name: 清理多余缩略图
        run: |
          find thumbs/ -type f | while read thumb; do

            original="photos/${thumb#thumbs/}"

            [ -f "$original" ] || rm "$thumb"

          done

          find thumbs/ -type d -empty -delete 2>/dev/null || true

      - name: 提交所有更改
        run: |
          git config user.name "github-actions[bot]"

          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          git diff --staged --quiet || (
            git commit -m "归档新照片并更新相册 [skip ci]"
            git push
          )