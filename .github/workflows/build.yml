name: Build Gallery

on:
  push:
    paths:
      - '*.jpg'
      - '*.jpeg'
      - '*.png'
      - '*.webp'
      - '*.JPG'
      - '*.JPEG'
      - '*.PNG'
      - '*.WEBP'

  workflow_dispatch:

concurrency:
  group: build-gallery
  cancel-in-progress: false

jobs:
  build:
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装图片处理工具
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: 创建必要目录
        run: |
          mkdir -p photos
          mkdir -p thumbs
          mkdir -p page

      - name: 归档照片
        run: |
          shopt -s nullglob

          for img in *.jpg *.jpeg *.png *.webp *.JPG *.JPEG *.PNG *.WEBP; do

            [ -f "$img" ] || continue

            sha256=$(sha256sum "$img" | cut -d' ' -f1 | head -c 12)

            ext="${img##*.}"

            exif_date=$(identify -format '%[EXIF:DateTimeOriginal]' "$img" 2>/dev/null)

            if [ -n "$exif_date" ]; then
              year=$(echo "$exif_date" | cut -d: -f1)
            else
              year=$(date -r "$img" +%Y)
            fi

            target_dir="photos/$year"

            mkdir -p "$target_dir"

            mv "$img" "$target_dir/$sha256.$ext"

            echo "归档: $img -> $year/$sha256.$ext"

          done

      - name: 生成缩略图
        run: |
          find photos/ -type f \( \
            -iname "*.jpg" -o \
            -iname "*.jpeg" -o \
            -iname "*.png" -o \
            -iname "*.webp" \
          \) | while read img; do

            relative_path="${img#photos/}"

            thumb_path="thumbs/$relative_path"

            thumb_dir=$(dirname "$thumb_path")

            mkdir -p "$thumb_dir"

            if [ ! -f "$thumb_path" ]; then

              convert "$img" -resize 400x -quality 80 "$thumb_path"

              echo "缩略图: $relative_path"

            fi

          done

      - name: 清理多余缩略图
        run: |
          find thumbs/ -type f | while read thumb; do

            original="photos/${thumb#thumbs/}"

            [ -f "$original" ] || rm "$thumb"

          done

          find thumbs/ -type d -empty -delete 2>/dev/null || true

      - name: 生成 photos.json
        run: |
          python3 scripts/build_photos_json.py

      - name: 提交所有更改
        run: |
          git config user.name "github-actions[bot]"

          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          git diff --staged --quiet || (
            git commit -m "归档新照片并更新相册 [skip ci]"
            git push
          )